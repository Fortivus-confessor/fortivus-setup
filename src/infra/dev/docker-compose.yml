services:
  # 1. Banco de Dados Central (PostgreSQL + PostGIS)
  postgres:
    image: postgis/postgis:16-3.5
    container_name: fortivus-postgres-dev
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - fortivus-network-dev

  # 2. Cache e Broker (Redis)
  redis:
    image: redis:alpine
    container_name: fortivus-redis-dev
    restart: always
    networks:
      - fortivus-network-dev

  # 3. Gestão de Identidade (Keycloak)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.4
    container_name: fortivus-auth-dev
    restart: always
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: true
      KC_HOSTNAME_URL: https://auth.${DOMAIN}
      KC_HOSTNAME_ADMIN_URL: https://auth.${DOMAIN}
    command: start-dev --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`auth.${DOMAIN}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls=true"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"
    networks:
      - fortivus-network-dev

  # 4. Object Storage (SeaweedFS)
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: fortivus-storage-dev
    restart: always
    command: 'server -s3'
    volumes:
      - seaweedfs_data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.seaweedfs.rule=Host(`${DOMAIN}`) && PathPrefix(`/storage`)"
      - "traefik.http.routers.seaweedfs.entrypoints=websecure"
      - "traefik.http.routers.seaweedfs.tls=true"
      - "traefik.http.routers.seaweedfs.tls.certresolver=letsencrypt"
      - "traefik.http.services.seaweedfs.loadbalancer.server.port=8333"
      - "traefik.http.middlewares.storage-strip.stripprefix.prefixes=/storage"
      - "traefik.http.routers.seaweedfs.middlewares=storage-strip"
    networks:
      - fortivus-network-dev

  # 5. RabbitMQ (Mensageria)
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fortivus-rabbitmq-dev
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    networks:
      - fortivus-network-dev

  # 6. Traefik (Edge Router / Proxy Reverso + TLS)
  traefik:
    image: traefik:latest
    container_name: fortivus-traefik-dev
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - letsencrypt:/letsencrypt
    networks:
      - fortivus-network-dev

  # 7. Frontend (Fire Command Center)
  frontend:
    build:
      context: ../../../../fire-command-center
      dockerfile: Dockerfile
    container_name: fortivus-frontend-dev
    restart: always
    environment:
      - VITE_KEYCLOAK_URL=https://auth.${DOMAIN}
      - VITE_API_SSR_BASE_URL=http://traefik/combate/api/v1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls=true"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=5173"
    networks:
      - fortivus-network-dev

  # 8. Backend (Fortivus V2)
  backend:
    build:
      context: ../../../../fortivus-v2
      dockerfile: Dockerfile
    container_name: fortivus-backend-dev
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI=https://auth.${DOMAIN}/realms/fortivus
      - SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI=http://keycloak:8080/realms/fortivus/protocol/openid-connect/certs
      - FORTIVUS_STORAGE_S3_ENDPOINT=http://seaweedfs:8333
      - FORTIVUS_STORAGE_S3_PUBLIC_URL=https://${DOMAIN}/storage
      - KEYCLOAK_SERVER_URL=http://keycloak:8080
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - VAULT_ADDR=${VAULT_ADDR}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`${DOMAIN}`) && PathPrefix(`/combate`)"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls=true"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.backend.loadbalancer.server.port=8080"
    networks:
      - fortivus-network-dev

  # 9. Attachment Service (Upload de Imagens)
  attachment:
    build:
      context: ../../../../attachment-service
      dockerfile: Dockerfile
    container_name: fortivus-attachment-dev
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SEAWEEDFS_S3_ENDPOINT=http://seaweedfs:8333
      - SEAWEEDFS_PUBLIC_URL=https://${DOMAIN}/storage
      - KEYCLOAK_ISSUER_URI=https://auth.${DOMAIN}/realms/fortivus
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - VAULT_ADDR=${VAULT_ADDR}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - rabbitmq
      - seaweedfs
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.attachment.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/v1/attachments`)"
      - "traefik.http.routers.attachment.entrypoints=websecure"
      - "traefik.http.routers.attachment.tls=true"
      - "traefik.http.routers.attachment.tls.certresolver=letsencrypt"
      - "traefik.http.services.attachment.loadbalancer.server.port=8082"
    networks:
      - fortivus-network-dev

  # 10. Fire Event Service (Focos de Calor)
  fire-event-service:
    build:
      context: ../../../../fire-event-service
      dockerfile: Dockerfile
    container_name: fortivus-fire-event-dev
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - VAULT_ROLE_ID=${VAULT_ROLE_ID}
      - VAULT_SECRET_ID=${VAULT_SECRET_ID}
      - VAULT_ADDR=${VAULT_ADDR}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - rabbitmq
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.fireevents.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/v1/fire-events`)"
      - "traefik.http.routers.fireevents.entrypoints=websecure"
      - "traefik.http.routers.fireevents.tls=true"
      - "traefik.http.routers.fireevents.tls.certresolver=letsencrypt"
      - "traefik.http.services.fireevents.loadbalancer.server.port=8084"
    networks:
      - fortivus-network-dev

networks:
  fortivus-network-dev:
    driver: bridge

volumes:
  postgres_data:
  seaweedfs_data:
  letsencrypt:
