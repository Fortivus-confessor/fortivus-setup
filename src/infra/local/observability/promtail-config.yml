server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: local_containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker_logs
          __path__: /var/lib/docker/containers/*/*.log

  - job_name: fortivus_java_app
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring_boot
          __path__: /opt/app/logs/*.log
